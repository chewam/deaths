name: Screenshots

on: deployment_status

jobs:
  capture:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Echo deployment_status
        run: |
          echo ${{ github.event.deployment_status.environment }}
          echo ${{ github.event.deployment_status.description }}
          echo ${{ github.event.deployment_status.state }}
          echo ${{ github.event.deployment_status.target_url }}
      - name: install puppeteer-headful
        uses: mujo-code/puppeteer-headful@master
        env:
          CI: "true"
      - name: screenshots-ci-action
        uses: flameddd/screenshots-ci-action@v1.1.1
        with:
          url: ${{ github.event.deployment_status.target_url }}
          devices: iPhone X,iPhone X landscape,iPhone 6,iPhone 6 landscape,Galaxy S5,Galaxy S5 landscape,Nexus 10,Nexus 10 landscape,iPad,iPad landscape
      - uses: actions/upload-artifact@v2
        with:
          path: screenshots
          name: test-screenshots
