name: Publish Docker image

on:
  release:
    types: [published]
  push:
    branches: [alpha]
  workflow_dispatch:

jobs:
  publish:
    # Runner ARM natif (gratuit pour repos publics depuis 2024).
    # Build linux/arm64 sans QEMU = ~30s vs ~5min via émulation.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Tags semver ne s'activent que sur ref de tag (release).
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # :latest réservé aux releases publiées sur master + workflow_dispatch depuis master.
            # Exclusion explicite des refs contenant 'alpha' : semantic-release publie des
            # GitHub releases pour les tags v2.0.0-alpha.N depuis la branche alpha, et sans
            # ce garde-fou `:latest` pointerait sur une image alpha.
            type=raw,value=latest,enable=${{ (github.event_name == 'release' && !contains(github.ref, 'alpha')) || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') }}
            # :alpha poussé uniquement depuis la branche alpha → review env k8s.
            type=raw,value=alpha,enable=${{ github.ref == 'refs/heads/alpha' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
